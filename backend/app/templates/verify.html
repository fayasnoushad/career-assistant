<html>

    <body style="font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px;">
        <div
            style="max-width: 600px; margin: auto; background: #fff; border-radius: 10px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <h2 style="color: #333;">Verify your email address</h2>
            <p>Thank you for signing up! Use the OTP below to verify your account:</p>
            <div style="font-size: 28px; font-weight: bold; letter-spacing: 6px; margin: 16px 0; color: #111;">
                {otp}
            </div>
            <p style="margin-top: 10px; font-size: 13px; color: #555;">
                This code expires in {otp_exp_minutes} minutes.
            </p>
        </div>
    </body>

</html>
