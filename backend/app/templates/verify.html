<html>

    <body style="font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px;">
        <div
            style="max-width: 600px; margin: auto; background: #fff; border-radius: 10px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <h2 style="color: #333;">Verify your email address</h2>
            <p>Thank you for signing up! Please verify your email by clicking the button below:</p>
            <a href="{verify_link}" style="display: inline-block; padding: 12px 20px; background-color: #007BFF; color: white; 
                          text-decoration: none; border-radius: 5px; font-weight: bold;">
                Verify Email
            </a>
            <p style="margin-top: 20px; font-size: 12px; color: #555;">
                Or copy and paste this link into your browser:<br>
                <a href="{verify_link}">{verify_link}</a>
            </p>
        </div>
    </body>

</html>
